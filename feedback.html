<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | Radhika Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
    <style>
        .page-header { padding: 150px 5% 50px; background: linear-gradient(135deg, rgba(20,20,20,0.9), rgba(10,10,10,0.9)), url('https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover; text-align: center; }
        .page-header h1 { font-size: 3.5rem; color: var(--primary-color); margin-bottom: 20px; }
        .feedback-container { padding: 50px 5%; max-width: 800px; margin: 0 auto; }
        .feedback-form { background: #111; padding: 40px; border-radius: 20px; border: 1px solid #333; }
        .input-group { margin-bottom: 20px; }
        label { display: block; color: #ccc; margin-bottom: 8px; font-size: 14px; }
        input, textarea { width: 100%; padding: 15px; background: #222; border: 1px solid #444; color: #fff; border-radius: 8px; font-family: 'Outfit', sans-serif; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 10px rgba(212,175,55,0.2); }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Radhika's</div>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">Who We Are</a></li>
            <li><a href="expertise.html">Our Expertise</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="upcoming-courses.html">Upcoming Courses</a></li>
            <li><a href="achievers.html">Achievers</a></li>
            <li><a href="feedback.html" style="color: var(--primary-color);">Feedback</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
        <a href="login.html" class="nav-btn">Student Portal</a>
    </nav>

    <div class="page-header gsap-reveal">
        <h1>Student Feedback</h1>
        <p>We value your experience</p>
    </div>

    <div class="feedback-container gsap-reveal">
        <div class="feedback-form">
            <h2>Share Your Thoughts</h2>
            <form action="#" method="POST">
                <div class="input-group">
                    <label>Name</label>
                    <input type="text" placeholder="Your Name" required>
                </div>
                <div class="input-group">
                    <label>Course Attended</label>
                    <input type="text" placeholder="Course Name" required>
                </div>
                <div class="input-group">
                    <label>Feedback</label>
                    <textarea rows="5" placeholder="Tell us about your experience..." required></textarea>
                </div>
                <button type="submit" class="cta-btn" style="width: 100%;">Submit Feedback</button>
            </form>
        </div>
    </div>

    <footer><p>&copy; 2026 Radhika's Academy, Coimbatore. All Rights Reserved.</p></footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="static/js/main.js"></script>
</body>
</html>
